<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trinity">
<meta name="theme-color" content="#000">
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB5PSI4NCIgZm9udC1zaXplPSI4MCI+8J+OpzwvdGV4dD48L3N2Zz4=">
<title>Trinity Voice — S25</title>
<style>
  :root { color-scheme: dark; --bg:#0a0a0f; --fg:#e8e8f0; --accent:#5ef0a8; --dim:#7a7a8a; --warn:#ff9a5a; --err:#ff5a6a; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  header { padding: 16px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; }
  .orb { width: 16px; height: 16px; border-radius: 50%; background: var(--dim); transition: all .3s; box-shadow: 0 0 0 0 transparent; }
  .orb.listening { background: var(--accent); box-shadow: 0 0 16px 4px var(--accent); animation: pulse 1.4s infinite; }
  .orb.processing { background: var(--warn); box-shadow: 0 0 16px 4px var(--warn); animation: pulse 0.6s infinite; }
  .orb.error { background: var(--err); }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.7; } }
  h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
  .sub { font-size: 11px; color: var(--dim); }
  main { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 10px 14px; border-radius: 14px; max-width: 85%; line-height: 1.4; font-size: 15px; }
  .msg.stef { background: #1a2030; align-self: flex-end; }
  .msg.trinity { background: #16201a; align-self: flex-start; border-left: 3px solid var(--accent); }
  .msg.sys { background: transparent; color: var(--dim); font-size: 12px; text-align: center; align-self: center; padding: 4px; }
  .msg pre { font-size: 11px; color: var(--dim); white-space: pre-wrap; margin-top: 6px; }
  footer { padding: 16px; border-top: 1px solid #222; display: flex; flex-direction: column; gap: 10px; }
  .interim { font-size: 13px; color: var(--dim); min-height: 18px; font-style: italic; }
  .controls { display: flex; gap: 8px; align-items: center; }
  button { background: #1a1a24; color: var(--fg); border: 1px solid #2a2a3a; padding: 10px 16px; border-radius: 10px; font-size: 14px; cursor: pointer; font-family: inherit; }
  button.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; flex: 1; }
  button.on { background: var(--err); border-color: var(--err); color: #fff; }
  button:active { transform: scale(0.97); }
  .status { font-size: 11px; color: var(--dim); text-align: center; }
  .hint { font-size: 11px; color: var(--dim); padding: 4px 8px; background: #14141c; border-radius: 6px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  input[type="text"] { background: #14141c; color: var(--fg); border: 1px solid #2a2a3a; padding: 10px 14px; border-radius: 10px; font-size: 14px; flex: 1; font-family: inherit; }
</style>
</head>
<body>
<header>
  <div id="orb" class="orb"></div>
  <div>
    <h1>Trinity Voice <span class="sub">· S25 Lumière</span></h1>
    <div class="sub" id="state">En attente · tape le bouton pour démarrer</div>
  </div>
</header>
<main id="feed">
  <div class="msg sys">🎧 Dicte ta commande. Exemples : « lance achat BTC 1 dollar dry run », « vends ETH 5 dollars », « quel est le prix de SOL », « statut du pipeline »</div>
</main>
<footer>
  <div class="interim" id="interim"></div>
  <div class="row">
    <input type="text" id="text-input" placeholder="Ou tape ici puis Entrée" />
    <button id="send-text">Envoyer</button>
  </div>
  <div class="controls">
    <button id="toggle" class="primary">▶︎ Démarrer l'écoute continue</button>
    <button id="ptt">🎙️ Dicter une fois</button>
  </div>
  <div class="status" id="status">Ready</div>
</footer>
<script>
const SECRET = new URLSearchParams(location.search).get('k') || localStorage.getItem('s25_secret') || '';
const BASE = location.origin;

const feed = document.getElementById('feed');
const orb = document.getElementById('orb');
const stateEl = document.getElementById('state');
const interim = document.getElementById('interim');
const toggle = document.getElementById('toggle');
const ptt = document.getElementById('ptt');
const statusEl = document.getElementById('status');
const textInput = document.getElementById('text-input');
const sendText = document.getElementById('send-text');

function append(kind, text, preExtra) {
  const el = document.createElement('div');
  el.className = 'msg ' + kind;
  el.textContent = text;
  if (preExtra) {
    const pre = document.createElement('pre');
    pre.textContent = preExtra;
    el.appendChild(pre);
  }
  feed.appendChild(el);
  feed.scrollTop = feed.scrollHeight;
  return el;
}

function setOrb(state) {
  orb.className = 'orb ' + (state || '');
  stateEl.textContent = {
    listening: '🎧 Écoute continue · dis ta commande',
    processing: '⚙️ Traitement...',
    error: '❌ Erreur — voir statut',
    speaking: '🗣️ Trinity parle...',
    '': 'En attente · tape ▶︎ pour démarrer'
  }[state] || '';
}

async function sendCommand(phrase) {
  if (!phrase || !phrase.trim()) return;
  append('stef', phrase);
  setOrb('processing');
  statusEl.textContent = 'POST /api/voice/command...';

  if (!SECRET) {
    append('sys', '⚠️ Pas de secret configuré — ajoute ?k=<SECRET> à l\'URL ou utilise localStorage s25_secret');
    setOrb('error');
    return;
  }

  try {
    const r = await fetch(BASE + '/api/voice/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-S25-Secret': SECRET },
      body: JSON.stringify({ phrase, sender: 'PWA_VOICE' })
    });
    const d = await r.json();
    statusEl.textContent = `HTTP ${r.status} · ${r.ok ? 'OK' : 'FAIL'}`;
    if (!r.ok || !d.ok) {
      const err = d.error || `HTTP ${r.status}`;
      append('trinity', '❌ ' + err, JSON.stringify(d, null, 2));
      speak('Erreur : ' + err);
      setOrb('error');
      return;
    }
    const p = d.parsed || {};
    const summary = `Mission ${d.mission_id} · ${p.action || '?'} ${p.symbol || '?'} pour ${p.usd_amount || '?'}$ · ${d.status}`;
    append('trinity', summary, JSON.stringify(d, null, 2));
    speak(summary);
    setOrb(listenerOn ? 'listening' : '');
  } catch (e) {
    statusEl.textContent = 'Réseau: ' + e.message;
    append('trinity', '❌ Réseau: ' + e.message);
    speak('Erreur réseau');
    setOrb('error');
  }
}

// ─── Web Speech API STT ──────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognizer = null;
let listenerOn = false;
let speaking = false;

function initRecognizer(continuous) {
  if (!SR) {
    append('sys', '❌ Web Speech API non supportée · Utilise Safari iOS ou Chrome.');
    return null;
  }
  const r = new SR();
  r.lang = 'fr-FR';
  r.continuous = continuous;
  r.interimResults = true;
  r.maxAlternatives = 1;
  let finalBuf = '';
  r.onstart = () => { setOrb('listening'); statusEl.textContent = 'Recognizer démarré'; };
  r.onresult = (ev) => {
    let interimStr = '';
    for (let i = ev.resultIndex; i < ev.results.length; i++) {
      const t = ev.results[i][0].transcript;
      if (ev.results[i].isFinal) finalBuf += t + ' ';
      else interimStr += t;
    }
    interim.textContent = finalBuf + (interimStr ? '… ' + interimStr : '');
    // On final, if there's a complete phrase, send
    if (continuous) {
      // Wake-word trigger OR direct command (if listener is active, anything final is a command)
      const trimmed = finalBuf.trim();
      if (trimmed && /\b(lance|achete|achète|vends|vend|execute|exécute|achat|vente|buy|sell|statut|status|prix|price|portefeuille|portfolio|solde|balance|mission|pipeline|trinity|hey trinity)\b/i.test(trimmed)) {
        finalBuf = '';
        interim.textContent = '';
        sendCommand(trimmed);
      }
    }
  };
  r.onerror = (e) => {
    statusEl.textContent = 'STT error: ' + e.error;
    if (e.error !== 'no-speech' && e.error !== 'aborted') {
      setOrb('error');
    }
  };
  r.onend = () => {
    if (continuous && listenerOn && !speaking) {
      try { r.start(); } catch (_) {}
    } else {
      if (!listenerOn) setOrb('');
    }
    // Flush any pending final buffer as a command
    if (!continuous && finalBuf.trim()) {
      const t = finalBuf.trim();
      finalBuf = '';
      interim.textContent = '';
      sendCommand(t);
    }
  };
  return r;
}

function startListen() {
  if (!recognizer) recognizer = initRecognizer(true);
  if (!recognizer) return;
  listenerOn = true;
  toggle.textContent = '■ Stop écoute';
  toggle.classList.add('on');
  try { recognizer.start(); } catch (_) {}
  setOrb('listening');
}
function stopListen() {
  listenerOn = false;
  toggle.textContent = '▶︎ Démarrer l\'écoute continue';
  toggle.classList.remove('on');
  if (recognizer) try { recognizer.stop(); } catch (_) {}
  setOrb('');
}
toggle.addEventListener('click', () => listenerOn ? stopListen() : startListen());

// Push-to-talk one-shot
ptt.addEventListener('click', () => {
  if (listenerOn) stopListen();
  const r = initRecognizer(false);
  if (r) {
    try { r.start(); } catch (_) {}
  }
});

// Text input fallback
sendText.addEventListener('click', () => { const v = textInput.value.trim(); if (v) { textInput.value = ''; sendCommand(v); } });
textInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendText.click(); });

// ─── Web Speech API TTS ──────────────────────────────────────────────────
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR';
  u.rate = 1.1;
  u.pitch = 1.0;
  speaking = true;
  setOrb('speaking');
  // Temporarily pause recognition while speaking to avoid echo loop
  const wasListening = listenerOn;
  if (wasListening && recognizer) { try { recognizer.stop(); } catch(_) {} }
  u.onend = () => {
    speaking = false;
    if (wasListening) {
      try { recognizer.start(); setOrb('listening'); } catch (_) { setOrb(''); }
    } else {
      setOrb('');
    }
  };
  speechSynthesis.speak(u);
}

// ─── Settings: accept secret via URL param ───────────────────────────────
if (SECRET) localStorage.setItem('s25_secret', SECRET);
statusEl.textContent = SECRET ? ('Secret OK · ' + SECRET.slice(0, 8) + '...') : 'Ajoute ?k=<SECRET> dans l\'URL';
</script>
</body>
</html>
