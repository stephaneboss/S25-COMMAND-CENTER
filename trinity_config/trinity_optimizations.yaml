# PRIORITÉ 2: Redeploy MERLIN to Akash Cloud
# ───────────────────────────────────────────────────────────────────

priority_2_merlin_akash:
  name: "MERLIN Cloud-Stable Deployment"
  status: "✅ CONFIGURATION READY"
  notes: "Akash v3 container already deployed — configuration updated"
  changes:
    - component: "MERLIN Orchestrator"
      current_state: "local (10.0.0.97) — breaks S25 doctrine"
      target_state: "Akash v3 cloud-stable"
      endpoint: "https://merlin.smajor.org"
      internal: "http://merlin-deployment.akash:8000"
      benefits:
        - "100% public stable endpoint"
        - "no_local_network_dependency"
        - "auto_restart_on_failure"
        - "redundant_deployment_id"

    - component: "Configuration"
      file: "agents/merlin_config/merlin_cloud_stable.yaml"
      status: "created"
      includes:
        - "Akash v3 integration settings"
        - "Consensus weight optimization (COMET: 0.65)"
        - "Health monitoring configuration"
        - "Redis state backend"

  deployment:
    - file: "agents/merlin_config/merlin_cloud_stable.yaml"
      status: "new"
      action: "use_for_akash_v3_merlin"

# ───────────────────────────────────────────────────────────────────
# PRIORITÉ 3: Make HA Accessible Remotely
# ───────────────────────────────────────────────────────────────────

priority_3_ha_remote:
  name: "HA Remote Access via Cloudflare Zero Trust"
  status: "✅ CONFIGURATION READY"
  current_state: "HA = http://10.0.0.136:8123 (LAN only)"
  target_state: "https://ha.smajor.org (100% remote secure)"

  options_evaluated:
    - option_a:
        name: "Cloudflare Zero Trust (RECOMMENDED)"
        status: "SELECTED"
        benefits:
          - "no_port_forwarding"
          - "no_ip_whitelist_maintenance"
          - "enterprise_level_security"
          - "free_tier_available"
        implementation: "Zero Trust tunnel → ha.smajor.org"

    - option_b:
        name: "S25 API as source of truth"
        status: "ALTERNATIVE"
        notes: "Can be combined with Option A"

  changes:
    - component: "Home Assistant Configuration"
      file: "ha/homeassistant_remote_access.yaml"
      status: "created"
      includes:
        - "Cloudflare trusted proxies configuration"
        - "external_url: https://ha.smajor.org"
        - "CORS settings for S25 agents"
        - "Webhook configurations for KIMI + MERLIN"
        - "Input text entities for endpoint monitoring"
        - "Security: IP ban, login attempt limits"

    - component: "agents.yaml"
      change: "Updated HA endpoint references"
      primary: "https://ha.smajor.org"
      fallback: "http://homeassistant.local:8123"

  deployment:
    - file: "ha/homeassistant_remote_access.yaml"
      status: "new"
      action: "use_for_remote_access"
    - cloudflare_zero_trust:
        status: "pending_manual_setup"
        steps:
          - "Go to Cloudflare Dashboard"
          - "Create tunnel: ha.smajor.org"
          - "Route to: http://homeassistant.local:8123"
          - "Enable Zero Trust authentication"

