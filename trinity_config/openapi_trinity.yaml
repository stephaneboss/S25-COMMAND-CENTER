openapi: 3.1.0
info:
  title: S25 Lumiere - TRINITY Bridge
  description: >
    Interface entre TRINITY GPT et le reseau S25 Lumiere.
    Permet a Stef de parler a GPT qui dispatch au reseau de trading.
  version: 2.0.0

servers:
  - url: http://kfhsi5oko9dbt3abob51g4s9q0.ingress.cap-test-compute.com
    description: S25 Cockpit Akash Production

paths:
  /api/vocal/status:
    get:
      operationId: trinityPing
      summary: Verifier que le reseau S25 est en ligne
      description: Healthcheck - retourne le status TRINITY et HA
      responses:
        "200":
          description: Systeme en ligne
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  trinity:
                    type: string
                  ha_token:
                    type: boolean
                  ts:
                    type: string

  /api/vocal/say:
    post:
      operationId: trinityDispatch
      summary: Envoyer un message vocal via Home Assistant TTS
      description: >
        Prononce un message via le TTS de Home Assistant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  description: Message a prononcer via TTS
                language:
                  type: string
                  default: fr-CA
                urgent:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Message envoye avec succes
        "401":
          description: Cle API invalide X-S25-Key
