name: Build & Push smajor.org Docker image

on:
  push:
    branches:
      - main
    paths:
      - "apps/smajor-command-center/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: stephaneboss/s25-command-center

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push smajor image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/smajor-command-center
          file: ./apps/smajor-command-center/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:smajor-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
