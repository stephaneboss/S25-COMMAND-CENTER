# ============================================================
# S25 LUMIERE — Docker Build & Push
# :main → push sur main (SANDBOX auto-update)
# :latest → release tag vX.X.X seulement (PROD)
# ============================================================
name: Docker Build & Push

on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tags (branch push = :main + :latest, release = semver)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable=${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'release' }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          GEMINI_API_KEY_MERLIN: ${{ secrets.GEMINI_API_KEY_MERLIN }}
          GEMINI_API_KEY_ARKON: ${{ secrets.GEMINI_API_KEY_ARKON }}
          GEMINI_API_KEY_KIMI: ${{ secrets.GEMINI_API_KEY_KIMI }}
          GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          HA_TOKEN: ${{ secrets.HA_TOKEN }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}

      - name: Summary
        run: |
          echo "## Docker Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**BOTH** :main + :latest updated — sandbox + prod en sync" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "**RELEASE** semver tag pushed" >> $GITHUB_STEP_SUMMARY
          fi
