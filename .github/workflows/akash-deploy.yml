name: Deploy to Akash

on:
  workflow_run:
      workflows: ["Docker Build & Push"]
          types:
                - completed
                    branches:
                          - main

                          jobs:
                            deploy-akash:
                                runs-on: ubuntu-latest
                                    if: ${{ github.event.workflow_run.conclusion == 'success' }}
                                        steps:
                                              - name: Checkout code
                                                      uses: actions/checkout@v4

                                                            - name: Setup Akash CLI
                                                                    run: |
                                                                              curl -sSfL https://raw.githubusercontent.com/akash-network/provider/main/install.sh | sh
                                                                                        echo "$HOME/.akash/bin" >> $GITHUB_PATH

                                                                                              - name: Verify Akash CLI
                                                                                                      run: akash version
                                                                                                      
                                                                                                            - name: Deploy to Akash DSEQ 26128127
                                                                                                                    env:
                                                                                                                              AKASH_KEYRING_BACKEND: test
                                                                                                                                        AKASH_CHAIN_ID: akashnet-2
                                                                                                                                                  AKASH_RPC: https://rpc.akashnet.net:443
                                                                                                                                                            AKASH_NET: mainnet
                                                                                                                                                                      AKASH_KEY_NAME: s25-deployer
                                                                                                                                                                                AKASH_ACCOUNT_ADDRESS: ${{ secrets.AKASH_WALLET_ADDRESS }}
                                                                                                                                                                                          AKASH_DEPLOY_KEY: ${{ secrets.AKASH_WALLET_KEY }}
                                                                                                                                                                                                  run: |
                                                                                                                                                                                                            # Import wallet
                                                                                                                                                                                                                      echo "$AKASH_DEPLOY_KEY" | akash keys import $AKASH_KEY_NAME --recover
                                                                                                                                                                                                                      
                                                                                                                                                                                                                                # Get current balance
                                                                                                                                                                                                                                          BALANCE=$(akash query bank balances $AKASH_ACCOUNT_ADDRESS --node $AKASH_RPC | jq -r '.balances[0].amount')
                                                                                                                                                                                                                                                    echo "Wallet balance: $BALANCE uakt"
                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                              # Check if DSEQ lease is active
                                                                                                                                                                                                                                                                        LEASE=$(akash query market leases --dseq 26128127 --node $AKASH_RPC 2>/dev/null | jq '.leases[0].lease_id' 2>/dev/null || echo "")
                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                  if [ -z "$LEASE" ] || [ "$LEASE" == "null" ]; then
                                                                                                                                                                                                                                                                                              echo "Lease not found, creating new deployment..."
                                                                                                                                                                                                                                                                                                          akash tx deployment create akash/deploy_lumiere_v2.yaml \
                                                                                                                                                                                                                                                                                                                        --from $AKASH_KEY_NAME \
                                                                                                                                                                                                                                                                                                                                      --node $AKASH_RPC \
                                                                                                                                                                                                                                                                                                                                                    --chain-id $AKASH_CHAIN_ID \
                                                                                                                                                                                                                                                                                                                                                                  --gas auto \
                                                                                                                                                                                                                                                                                                                                                                                --gas-adjustment 1.5 \
                                                                                                                                                                                                                                                                                                                                                                                              --yes \
                                                                                                                                                                                                                                                                                                                                                                                                            --broadcast-mode block
                                                                                                                                                                                                                                                                                                                                                                                                                      else
                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "Lease active: $LEASE"
                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "Deployment already running on DSEQ 26128127"
                                                                                                                                                                                                                                                                                                                                                                                                                                                        fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Verify deployment
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                AKASH_RPC: https://rpc.akashnet.net:443
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  sleep 10
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            DSEQ=$(akash query market deployments --owner ${{ secrets.AKASH_WALLET_ADDRESS }} --node $AKASH_RPC | jq -r '.deployments[] | select(.deployment_id.dseq == "26128127") | .deployment_id.dseq' | head -1)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if [ ! -z "$DSEQ" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "✅ Deployment DSEQ $DSEQ is active"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "⚠️ Deployment may be pending (check Akash console)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Send deployment notification
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if: always()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  STATUS="${{ job.status }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "Akash deployment status: $STATUS"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "DSEQ 26128127 | Image: ghcr.io/stephaneboss/s25-command-center:latest"
