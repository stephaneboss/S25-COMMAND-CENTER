name: Build Browser Service

on:
  push:
    branches: [main]
    paths:
      - 'agents/browser_service/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: agents/browser_service
          push: true
          tags: ghcr.io/stephaneboss/s25-browser-service:latest
