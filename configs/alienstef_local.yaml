# ============================================
# S25 COMMAND CENTER - AlienStef Local Node
# Machine: Dell Linux (Ubuntu) - 10.0.0.97
# Date: 2026-03-15
# ============================================

node:
  name: alienstef-local
  hostname: 10.0.0.97
  os: Ubuntu Linux (upgraded 2026-03-15)
  role: dev-local
  location: LAN Saint-Jerome

# --- Services ---
services:
  ollama:
    url: http://10.0.0.97:11434
    status: active
    models:
      - qwen2.5-coder:14b
    env:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_ORIGINS: "*"

  open_webui:
    url: http://10.0.0.97:3000
    port: 3000
    status: active
    backend: ollama
    note: "Instance stable, connectee a Ollama, Qwen2.5 disponible"

  openhands:
    url: http://10.0.0.97:3001
    port: 3001
    status: active
    agent: CodeActAgent
    llm:
      provider: ollama
      model: ollama/qwen2.5-coder:14b
      base_url: http://10.0.0.97:11434
    note: "Agent de code autonome, connecte a Ollama local"

# --- Integration S25 ---
integration:
  github_repo: stephaneboss/S25-COMMAND-CENTER
  mesh_role: local-builder
  agents_access:
    - comet
    - claude
    - merlin
  capabilities:
    - code_generation
    - terminal_execution
    - repo_management
    - local_model_inference
