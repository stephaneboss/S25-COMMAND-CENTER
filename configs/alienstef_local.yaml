# ============================================
# S25 COMMAND CENTER - AlienStef Local Node
# Machine: Dell Linux (Ubuntu) - 10.0.0.97
# Date: 2026-03-15
# ============================================

node:
  name: alienstef-local
  hostname: 10.0.0.97
  os: Ubuntu Linux (upgraded 2026-03-15)
  role: dev-local
  location: LAN Saint-Jerome

# --- Services ---
services:
  ollama:
    url: http://10.0.0.97:11434
    status: active
    models:
      - qwen2.5-coder:7b
      - qwen2.5-coder:14b   # pull en cours 2026-04-12
    gpu: "NVIDIA GeForce RTX 3060 LHR (12GB VRAM)"
    gpu_status: "driver 580 installe, module kernel a recharger (conflit 550 a purger)"
    env:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_ORIGINS: "*"

  open_webui:
    url: http://10.0.0.97:3000
    port: 3000
    status: active
    backend: ollama
    container: s25-open-webui
    note: "Instance stable, connectee a Ollama, Qwen2.5 disponible"

  openjarvis:
    url: http://10.0.0.97:3002
    port: 3002
    status: active
    container: s25-openjarvis
    note: "Jarvis assistant, healthy"

  bras_alien:
    url: http://10.0.0.97:8787
    port: 8787
    status: active
    container: s25-bras-alien
    note: "Bras robotique/automation"

  win_bridge:
    url: http://10.0.0.97:3389
    port: 3389
    status: active
    container: S25-WIN-BRIDGE
    note: "Pont RDP Windows, up depuis 47h+"

  cloudflared:
    path: /usr/local/bin/cloudflared
    status: installed
    note: "Pret pour tunnel nomme S25"

# --- Integration S25 ---
integration:
  github_repo: stephaneboss/S25-COMMAND-CENTER
  mesh_role: local-builder
  agents_access:
    - comet
    - claude
    - merlin
  capabilities:
    - code_generation
    - terminal_execution
    - repo_management
    - local_model_inference
