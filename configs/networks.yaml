# ─── DEX Swap Routes ──────────────────────────────────────────────────

swap_routes:

  ATOM_to_AKT:
    dex: osmosis
    input_denom: uatom
    output_denom: uakt
    # Pool route: ATOM/OSMO (pool 1) → OSMO/AKT (pool 3)
    pools: [1, 3]
    slippage_tolerance_pct: 1.0
    min_output_multiplier: 0.99

  OSMO_to_AKT:
    dex: osmosis
    input_denom: uosmo
    output_denom: uakt
    # Direct OSMO/AKT pool
    pools: [3]
    slippage_tolerance_pct: 1.0

  ATOM_to_OSMO:
    dex: osmosis
    input_denom: uatom
    output_denom: uosmo
    pools: [1]
    slippage_tolerance_pct: 0.5

# ─── Exchange Connections ─────────────────────────────────────────────

exchanges:

  mexc:
    base_url: https://api.mexc.com
    ws_url: wss://wbs.mexc.com/ws
    active: true
    pairs:
      - BTC/USDT
      - ETH/USDT
      - AKT/USDT
      - ATOM/USDT

# ─── Price Feeds ─────────────────────────────────────────────────────

price_feeds:

  coingecko:
    base_url: https://api.coingecko.com/api/v3
    rate_limit_per_min: 30
    batch_size: 20
    active: true

  binance:
    base_url: https://api.binance.com/api/v3
    active: true
    note: "No API key needed for public endpoints"
