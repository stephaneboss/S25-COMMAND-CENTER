# ─── Cosmos Ecosystem ────────────────────────────────────────────────

networks:

  cosmoshub:
    chain_id: cosmoshub-4
    symbol: ATOM
    native_denom: uatom
    decimals: 6
    coingecko_id: cosmos
    lcd: https://rest.cosmos.directory/cosmoshub
    rpc: https://rpc.cosmos.directory/cosmoshub
    explorer: https://www.mintscan.io/cosmos
    wallet_prefix: cosmos
    active: true

  akash:
    chain_id: akashnet-2
    symbol: AKT
    native_denom: uakt
    decimals: 6
    coingecko_id: akash-network
    lcd: https://rest.cosmos.directory/akash
    rpc: https://rpc.cosmos.directory/akash
    explorer: https://www.mintscan.io/akash
    wallet_prefix: akash
    console: https://console.akash.network
    active: true

  osmosis:
    chain_id: osmosis-1
    symbol: OSMO
    native_denom: uosmo
    decimals: 6
    coingecko_id: osmosis
    lcd: https://rest.cosmos.directory/osmosis
    rpc: https://rpc.cosmos.directory/osmosis
    explorer: https://www.mintscan.io/osmosis
    wallet_prefix: osmo
    dex_url: https://app.osmosis.zone
    sqs_api: https://sqs.osmosis.zone
    active: true

  # ─── Future chains (activate as empire expands) ──────────────────

  celestia:
