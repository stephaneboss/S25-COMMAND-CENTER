services:
  s25-cockpit:
    image: ghcr.io/stephaneboss/s25-command-center:main
    restart: unless-stopped
    ports:
      - "7777:7777"
    env_file:
      - .env
    environment:
      PORT: "7777"
      MEMORY_DIR: /app/memory
      RUN_ORACLE_AGENT: "true"
      RUN_ONCHAIN_GUARDIAN: "true"
      RUN_MERLIN_MCP_BRIDGE: "true"
      RUN_MERLIN_FEEDBACK_LOOP: "true"
      RUN_GEMINI_OPS_DAEMON: "true"
      RUN_TREASURY_AUTOPILOT: "true"
      MERLIN_MCP_PORT: "8000"
      MERLIN_MCP_PATH: "/mcp"
      MERLIN_FEEDBACK_SECONDS: "300"
      GEMINI_OPS_POLL_SECONDS: "600"
      GEMINI_MCP_ENDPOINT: "https://da0m4r4tu5ctn0ja9r2t9c2vho.ingress.akashprovid.com/mcp"
      RUN_GEMINI_MEMORY_REBUILD: "false"
      TREASURY_POLL_SECONDS: "900"
      TREASURY_DEPLOYMENTS: "25708774,25817341"
      TREASURY_AUTOMISSION: "true"
      ORACLE_POLL_SECONDS: "300"
      ORACLE_SYMBOLS: "BTC,ETH,AKT,ATOM"
      ONCHAIN_POLL_SECONDS: "420"
      ONCHAIN_TOKEN_LIST: ""
      GEMINI_EMBED_MODEL: "gemini-embedding-001"
    volumes:
      - s25_memory:/app/memory
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Auto-deploy: pulls new :main image every 5min ──────────
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_LABEL_ENABLE: "false"
      WATCHTOWER_NOTIFICATIONS: "slack"
    command: s25-cockpit

volumes:
  s25_memory:
