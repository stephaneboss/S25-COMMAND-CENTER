# ============================================================
# S25 LUMIÈRE — Akash Deployment SDL v2
# Image: ghcr.io/stephaneboss/s25-command-center:latest
# Auto-built by GitHub Actions on every push to main
# Update deployment: akash/scripts/update_cockpit.sh
# ============================================================
---
version: "2.0"

services:
  s25-cockpit:
    image: ghcr.io/stephaneboss/s25-command-center:latest
    expose:
      - port: 7777
        as: 80
        to:
          - global: true
    env:
      - HA_URL=http://homeassistant.local:8123
      - HA_TOKEN=REPLACE_WITH_HA_TOKEN
      - GEMINI_API_KEY=REPLACE_WITH_GEMINI_KEY
      - PORT=7777
      - CHECK_INTERVAL=60

profiles:
  compute:
    s25-cockpit:
      resources:
        cpu:
          units: 0.25
        memory:
          size: 256Mi
        storage:
          size: 512Mi

  placement:
    akash:
      pricing:
        s25-cockpit:
          denom: uakt
          amount: 100

deployment:
  s25-cockpit:
    akash:
      profile: s25-cockpit
      count: 1
