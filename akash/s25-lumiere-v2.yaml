---
version: "2.0"


services:
  s25-lumiere:
    image: ghcr.io/stephaneboss/s25-command-center:latest
    expose:
      - port: 7777
        as: 8080
        to:
          - global: true
      - port: 9090
        as: 9090
        to:
          - global: true
      - port: 9191
        as: 9191
        to:
          - global: true
    env:
      - HA_URL=http://homeassistant.local.local:8123
      - HA_TOKEN=
      - ANTHROPIC_API_KEY=
      - OPENAI_API_KEY=
      - GEMINI_API_KEY=
      - KIMI_API_KEY=
      - PERPLEXITY_API_KEY=
      - MEXC_API_KEY=
      - MEXC_SECRET_KEY=
      - CLOUDFLARE_TOKEN=
      - PORT=7777
      - S25_SHARED_SECRET=s25_lumiere_prod_2026
      - CHECK_INTERVAL=60
      - ORACLE_SYMBOLS=BTC,ETH,AKT,ATOM
      - GEMINI_MODEL=gemini-1.5-flash


profiles:
  compute:
    s25-lumiere:
      resources:
        cpu:
          units: 1.0
        memory:
          size: 512Mi
        storage:
          size: 1Gi
  placement:
    dcloud:
      pricing:
        s25-lumiere:
          denom: uakt
          amount: 1000

deployment:
  s25-lumiere:
    dcloud:
      profile: s25-lumiere
      count: 1
