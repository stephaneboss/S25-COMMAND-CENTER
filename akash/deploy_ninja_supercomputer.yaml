# S25 NINJA COMMAND CENTER - SDL Akash
# RTX3090 24GB - VRAM optimise pour multi-agent
# BUGFIX: denom uact (Akash BME Mainnet 2026)
# VERSION: 3090-ONLY - Mise a jour 2026-04-01
# NOTE: PASSWORD a rotater apres premier acces stable
---
version: "2.0"
services:
  s25-ninja:
    image: lscr.io/linuxserver/webtop:ubuntu-kde
    expose:
      - port: 3000
        as: 3000
        to:
          - global: true
      - port: 3001
        as: 3001
        to:
          - global: true
    env:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - SUBFOLDER=/
      - TITLE=S25-Ninja-Command-Center
      - CUSTOM_USER=major
      - PASSWORD=major2244668800
profiles:
  compute:
    s25-ninja:
      resources:
        cpu:
          units: 4
        memory:
          size: 32Gi
        storage:
          - size: 100Gi
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: rtx3090
                  ram: 24
                - model: rtx3090ti
                  ram: 24
  placement:
    akash:
      pricing:
        s25-ninja:
          denom: uact
          amount: 100000
deployment:
  s25-ninja:
    akash:
      profile: s25-ninja
      count: 1
