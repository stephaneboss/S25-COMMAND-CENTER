---
version: "2.0"
services:
  s25-lumiere:
    image: ghcr.io/stephaneboss/s25-command-center:latest
    expose:
      - port: 7777
        as: 8080
        to:
          - global: true
      - port: 5000
        as: 5000
        to:
          - global: false
      - port: 5001
        as: 5001
        to:
          - global: false
      - port: 5002
        as: 5002
        to:
          - global: false
      - port: 5003
        as: 5003
        to:
          - global: false
    env:
      - HA_URL=http://10.0.0.136:8123
      - MEXC_BASE_URL=https://api.mexc.com
      - TRINITY_ENABLED=true
      - ARKON_ENABLED=true
      - KIMI_ENABLED=true
      - MERLIN_ENABLED=true
      - COMET_ENABLED=true
      - DRY_RUN=false
      - PORT=7777
      - BUILD=20260405-endpoint-fix
      - TRINITY_ENDPOINT=http://3mrnmfj4v99jpcfsem9ca4r368.ingress.akash.antonaccimattia.it/api/trinity
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - MEXC_API_KEY=${MEXC_API_KEY}
      - MEXC_API_SECRET=${MEXC_API_SECRET}
      - CLOUDFLARE_TOKEN=${CLOUDFLARE_TOKEN}
      - HA_TOKEN=${HA_TOKEN}
      - S25_SHARED_SECRET=${S25_SHARED_SECRET}
profiles:
  compute:
    s25-lumiere:
      resources:
        cpu:
          units: 4
        memory:
          size: 8Gi
        storage:
          - size: 40Gi
  placement:
    akash:
      pricing:
        s25-lumiere:
          denom: uakt
          amount: 1000
deployment:
  s25-lumiere:
    akash:
      profile: s25-lumiere
      count: 1
