---
version: "2.0"

services:
  s25-sandbox:
    image: ghcr.io/stephaneboss/s25-command-center@sha256:48e9a6b0c8da12f474a8ec12ec995987cf1eeb4eb6d9852ba7c7fdb7fde0e508
    expose:
      - port: 7777
        as: 80
        to:
          - global: true
      - port: 8000
        as: 8000
        to:
          - global: true
    env:
      - HA_URL=http://10.0.0.136:8123
      - HA_TOKEN=
      - GEMINI_API_KEY=
      - MEMORY_DIR=/app/memory
      - PORT=7777
      - S25_SHARED_SECRET=REDACTED_SECRET
      - RUN_ORACLE_AGENT=true
      - RUN_ONCHAIN_GUARDIAN=true
      - RUN_MERLIN_MCP_BRIDGE=true
      - RUN_MERLIN_FEEDBACK_LOOP=true
      - RUN_TREASURY_AUTOPILOT=true
      - MERLIN_MCP_PORT=8000
      - MERLIN_MCP_PATH=/mcp
      - MERLIN_FEEDBACK_SECONDS=300
      - TREASURY_POLL_SECONDS=900
      - TREASURY_DEPLOYMENTS=25708774,25817341
      - TREASURY_AUTOMISSION=true
      - ORACLE_POLL_SECONDS=300
      - ORACLE_SYMBOLS=BTC,ETH,AKT,ATOM
      - ONCHAIN_POLL_SECONDS=420
      - ONCHAIN_TOKEN_LIST=

profiles:
  compute:
    s25-sandbox:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 512Mi

  placement:
    akash:
      pricing:
        s25-sandbox:
          denom: uakt
          amount: 100

deployment:
  s25-sandbox:
    akash:
      profile: s25-sandbox
      count: 1
