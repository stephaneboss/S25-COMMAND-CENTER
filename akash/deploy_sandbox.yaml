---
version: "2.0"

services:
  s25-sandbox:
    image: ghcr.io/stephaneboss/s25-command-center:main
    expose:
      - port: 7777
        as: 80
        to:
          - global: true
    env:
      - HA_URL=http://10.0.0.136:8123
      - HA_TOKEN=
      - GEMINI_API_KEY=
      - MEMORY_DIR=/app/memory
      - PORT=7777
      - S25_SHARED_SECRET=REDACTED_SECRET

profiles:
  compute:
    s25-sandbox:
      resources:
        cpu:
          units: 0.25
        memory:
          size: 256Mi
        storage:
          size: 512Mi

  placement:
    akash:
      pricing:
        s25-sandbox:
          denom: uakt
          amount: 100

deployment:
  s25-sandbox:
    akash:
      profile: s25-sandbox
      count: 1
