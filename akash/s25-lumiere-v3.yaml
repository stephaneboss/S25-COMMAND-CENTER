---
# S25-LUMIERE-v3 - LIVE DEPLOYMENT
# DSEQ: 26269781 | Provider: provider.team-michel.com | Port: 7777->30717
# Deployed: 2026-04-06 | Status: ACTIVE | DRY_RUN=true
# All 5 agents: TRINITY / ARKON / KIMI / MERLIN / COMET
# Real keys stored in GitHub Secrets / Akash env vars only
version: "2.0"
services:
  service-1:
    image: ghcr.io/stephaneboss/s25-command-center:latest
    expose:
      - port: 7777
        as: 8080
        to:
          - global: true
    env:
      - HA_URL=http://10.0.0.136:8123
      - MEXC_BASE_URL=https://api.mexc.com
      - TRINITY_ENABLED=true
      - ARKON_ENABLED=true
      - KIMI_ENABLED=true
      - MERLIN_ENABLED=true
      - COMET_ENABLED=true
      - DRY_RUN=true
      - PORT=7777
      - BUILD=20260406-ha-token-live
      - TRINITY_ENDPOINT=http://provider.team-michel.com:30717/api/trinity
      - GEMINI_API_KEY=INJECT_FROM_SECRETS
      - PERPLEXITY_API_KEY=INJECT_FROM_SECRETS
      - MEXC_API_KEY=INJECT_FROM_SECRETS
      - MEXC_API_SECRET=INJECT_FROM_SECRETS
      - S25_SHARED_SECRET=INJECT_FROM_SECRETS
      - HA_TOKEN=INJECT_FROM_SECRETS
profiles:
  compute:
    service-1:
      resources:
        cpu:
          units: 4
        memory:
          size: 8Gi
        storage:
          - size: 40Gi
  placement:
    akash:
      pricing:
        service-1:
          denom: uact
          amount: 1000
deployment:
  service-1:
    akash:
      profile: service-1
      count: 1
