---
# ============================================================
# S25 Lumière — Kimi Web3 Trader
# ============================================================
# Agent   : KIMI — Osmosis DEX arbitrage sniper
# Version : BUILD 18 — fee abstraction (gas in ATOM)
# Port    : 9191 (Flask REST API)
# Network : Osmosis mainnet (osmosis-1)
#
# Endpoints:
#   GET  /health     — liveness probe
#   GET  /status     — full agent state
#   GET  /intel      — live prices + signals
#   POST /command    — manual trigger {action: snipe|prices|trade_log|pnl}
#
# Deploy : akash tx deployment create deploy_kimi_web3_trader.yaml --from <wallet> --fees 500uatom --gas auto --chain-id akashnet-2
# Update : akash tx deployment update deploy_kimi_web3_trader.yaml --from <wallet> --dseq <DSEQ> --fees 500uatom --gas auto --chain-id akashnet-2
# Close  : akash tx deployment close --from <wallet> --dseq <DSEQ> --fees 500uatom --chain-id akashnet-2
# ============================================================

version: "2.0"

services:
  kimi-web3-trader:
    image: python:3.11-slim
    expose:
      - port: 9191
        as: 80
        to:
          - global: true
    env:
      # ── Build ──────────────────────────────────────────────
      - KIMI_BUILD=18
      - PYTHONUNBUFFERED=1

      # ── Trading config ─────────────────────────────────────
      - DRY_RUN=false
      - TRADE_SIZE_USD=5
      - SCAN_INTERVAL=5
      - ARBI_THRESHOLD=0.003
      - CHAINS=cosmos
      - FLASK_PORT=9191

      # ── Wallet ─────────────────────────────────────────────
      - WALLET_ADDRESS=${AKASH_WALLET_ADDRESS}
      - WALLET_MNEMONIC=${WALLET_MNEMONIC}

    command:
      - bash
      - "-c"
      - |
        set -e
        echo "============================================"
        echo " S25 Lumière — Kimi Web3 Trader BUILD 18"
        echo " Mode: LIVE | Threshold: 0.3% | Interval: 5s"
        echo "============================================"
        apt-get update -qq && apt-get install -y -qq git curl
        pip install --quiet --upgrade pip
        pip install --quiet flask requests cosmpy ecdsa protobuf
        git clone --depth 1 https://github.com/stephaneboss/S25-COMMAND-CENTER.git /s25
        cd /s25
        python3 agents/kimi_web3_trader.py

    resources:
      cpu:
        units: 1
      memory:
        size: 512Mi
      storage:
        size: 1Gi

profiles:
  compute:
    kimi-web3-trader:
      resources:
        cpu:
          units: 1
        memory:
          size: 512Mi
        storage:
          size: 1Gi
  placement:
    akash:
      pricing:
        kimi-web3-trader:
          denom: uakt
          amount: 100

deployment:
  kimi-web3-trader:
    akash:
      profile: kimi-web3-trader
      count: 1
