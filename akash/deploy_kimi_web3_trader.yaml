---
# ============================================================
# S25 Lumière — Kimi Web3 Trader — Akash SDL
# Agent: KIMI (Moonshot) — Multi-chain arbitrage sniper
# Port: 9191 (Flask REST API)
#
# Deploy: akash tx deployment create deploy_kimi_web3_trader.yaml
# Update: akash tx deployment update deploy_kimi_web3_trader.yaml --dseq <DSEQ>
#
# BUILD 16: Uses wallet._private_key.sign() — no bip_utils API issues
# ============================================================

version: "2.0"

services:
  kimi-web3-trader:
    image: python:3.11-slim
    expose:
      - port: 9191
        as: 80
        to:
          - global: true
    env:
      - KIMI_BUILD=16
      - DRY_RUN=false
      - TRADE_SIZE_USD=5
      - SCAN_INTERVAL=30
      - ARBI_THRESHOLD=0.003
      - CHAINS=cosmos
      - FLASK_PORT=9191
      - WALLET_ADDRESS=REDACTED_WALLET_ADDRESS
      - WALLET_MNEMONIC=REDACTED_MNEMONIC
    command:
      - bash
      - "-c"
      - |
        apt-get update -qq && apt-get install -y -qq git curl && \
        pip install --quiet flask requests cosmpy && \
        git clone https://github.com/stephaneboss/S25-COMMAND-CENTER.git /s25 && \
        cd /s25 && \
        echo "=== Kimi Web3 Trader BUILD 16 Starting ===" && \
        python3 agents/kimi_web3_trader.py
    resources:
      cpu:
        units: 1
      memory:
        size: 512Mi
      storage:
        size: 1Gi

profiles:
  compute:
    kimi-web3-trader:
      resources:
        cpu:
          units: 1
        memory:
          size: 512Mi
        storage:
          size: 1Gi
  placement:
    akash:
      pricing:
        kimi-web3-trader:
          denom: uakt
          amount: 100

deployment:
  kimi-web3-trader:
    akash:
      profile: kimi-web3-trader
      count: 1
