# ═══════════════════════════════════════════════════════════════════
# MERLIN Cloud-Stable Configuration
# PRIORITÉ 2: Akash v3 Deployment
# ═══════════════════════════════════════════════════════════════════

merlin:
  version: "3.0-CLOUD"
  # PRIORITÉ 2: Endpoint on Akash v3 (NOT local)
  endpoints:
    primary: "https://merlin.smajor.org"  # Public stable endpoint (Akash v3)
    akash_internal: "http://merlin-deployment.akash:8000"  # Internal Akash communication
    fallback_local: ""  # DEPRECATED — local endpoint removed

  mode: "cloud-first-stable"
  cloud_provider: "akash"
  deployment_version: "v3"
  redundancy_mode: "akash-primary"

  # API Configuration
  api:
    host: "0.0.0.0"
    port: 8000
    protocol: "http"  # Behind Cloudflare Zero Trust proxy
    timeout: 20
    max_connections: 100

  # MERLIN Orchestrator Capabilities
  capabilities:
    command_execution: true
    agent_coordination: true
    signal_processing: true
    risk_management: true
    real_time_monitoring: true

  # Agent Pool Management
  agents:
    comet:
      weight: 0.65  # BONUS: Optimized for consensus
      enabled: true
      timeout: 15

    gemini:
      weight: 0.35
      enabled: true
      timeout: 15

    claude:
      weight: 0.25
      enabled: true
      timeout: 15

  # Watchdog & Health Monitoring
  monitoring:
    health_check_interval: 60
    metrics_endpoint: "/metrics"
    status_endpoint: "/status"
    ready_probe: "/ready"
    live_probe: "/health"

  # Akash Integration
  akash:
    enabled: true
    deployment_id: "25708774"  # Primary deployment
    fallback_id: "25817341"  # Secondary fallback
    monitoring_interval: 120
    auto_restart: true
    max_restart_attempts: 3

  # Logging & Audit
  logging:
    level: "INFO"
    format: "json"
    file: "/logs/merlin.log"
    audit_enabled: true
    audit_file: "/logs/merlin_audit.jsonl"

# Message Routing Configuration
routing:
  enable_consensus: true
  consensus_threshold: 2  # Min agents for consensus
  routing_strategy: "smart"
  latency_threshold_ms: 500
  fallback_strategy: "queue"

# Security
security:
  require_auth: false  # Protected by Cloudflare Zero Trust
  rate_limit: 1000
  rate_limit_window: 60
  allow_cors: ["https://trinity-s25-proxy.trinitys25steph.workers.dev"]

# Database & State
state:
  backend: "redis"
  redis_url: "redis://redis:6379"
  persistence: true
  snapshot_interval: 300
