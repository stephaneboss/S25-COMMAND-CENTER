openapi: 3.1.0
info:
  title: S25 Lumiere - Trinity Bridge API
  description: "OpenAPI TRINITY vers cockpit S25. Serveur stable: https://s25.smajor.org (Cloudflare proxy — toujours valide). Cockpit direct: http://provider.team-michel.com:31554 (DSEQ 26270769 — actif)."
  version: 2.7.0


servers:
  - url: https://s25.smajor.org
    description: S25 Cockpit — domaine stable Cloudflare (PRIMARY — utiliser toujours celui-ci)
  - url: http://provider.team-michel.com:31554
    description: S25 Cockpit direct Akash (DSEQ 26270769 — provider.team-michel.com — actif)


components:
  schemas:
    TrinityRequest:
      type: object
      required: [intent, action]
      properties:
        intent:
          type: string
          description: Intention courte ou commande de Stef.
          examples: ["Status S25", "Analyse BTC pour aujourd'hui", "Signal BTC BUY"]
        action:
          type: string
          enum: [query, status, analyze, signal, mission, route]
          description: Type de routage demande au bridge TRINITY.
        data:
          type: object
          description: Payload optionnel pour les signaux ou parametres additionnels.
          additionalProperties: true
    MissionRequest:
      type: object
      required: [created_by, target, task_type, intent]
      properties:
        created_by:
          type: string
