name = "merlin-s25-proxy"
main = "src/index.js"
compatibility_date = "2026-03-11"
workers_dev = true
routes = [
  { pattern = "merlin.smajor.org", custom_domain = true }
]

[vars]
# Set via `wrangler secret put ORIGIN_BASE` and `wrangler secret put ORIGIN_HOST_HEADER`
ORIGIN_BASE = "${AKASH_COCKPIT_ORIGIN}"
ORIGIN_HOST_HEADER = "${AKASH_COCKPIT_HOST}"
PROXY_TIMEOUT_MS = "30000"
PROXY_RETRIES = "0"
