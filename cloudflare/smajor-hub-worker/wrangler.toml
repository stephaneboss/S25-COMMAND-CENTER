name = "smajor-hub"
main = "src/index.js"
compatibility_date = "2026-03-11"
workers_dev = true
routes = [
  { pattern = "smajor.org", custom_domain = true },
  { pattern = "www.smajor.org", custom_domain = true },
  { pattern = "app.smajor.org", custom_domain = true },
  { pattern = "s25.smajor.org", custom_domain = true },
  { pattern = "api.smajor.org", custom_domain = true }
]

[vars]
PUBLIC_APP_URL = "https://app.smajor.org"
PUBLIC_API_URL = "https://api.smajor.org"
PUBLIC_S25_URL = "https://s25.smajor.org"
PUBLIC_MERLIN_URL = "https://merlin.smajor.org"
# Akash cockpit LIVE — set via `wrangler secret put DIRECT_RUNTIME_URL`
DIRECT_RUNTIME_URL = "${AKASH_COCKPIT_ORIGIN}"
MASTER_WALLET_ADDRESS = "REDACTED_WALLET_ADDRESS"
MASTER_WALLET_LABEL = "Wallet creator"
# S25_WEBHOOK_PRIVATE_KEY — moved to Cloudflare secrets (wrangler secret put S25_WEBHOOK_PRIVATE_KEY)
