name = "trinity-s25-proxy"
main = "src/index.js"
compatibility_date = "2026-03-10"
workers_dev = true
routes = [
  { pattern = "s25.smajor.org", custom_domain = true },
  { pattern = "api.smajor.org", custom_domain = true }
]

[vars]
# CRITICAL: ORIGIN_BASE must be kept in sync with Akash Trinity deployment
# When Trinity endpoint changes, update both this value and the Akash deploy_cockpit.yaml COCKPIT_ENDPOINT
# Current endpoint should match GitHub Actions deployed Trinity endpoint
# CRITICAL: Set these via `wrangler secret put ORIGIN_BASE` and `wrangler secret put ORIGIN_HOST_HEADER`
# Or override in .dev.vars for local dev
ORIGIN_BASE = "https://cockpit-alien.smajor.org"
ORIGIN_HOST_HEADER = "cockpit-alien.smajor.org"
PUBLIC_GATEWAY_URL = "https://api.smajor.org"
PUBLIC_RUNTIME_URL = "https://s25.smajor.org"
PROXY_TIMEOUT_MS = "15000"
PROXY_RETRIES = "1"
FALLBACK_ORIGIN = "https://cockpit-alien.smajor.org"
# S25_WEBHOOK_PRIVATE_KEY — moved to Cloudflare secrets (wrangler secret put S25_WEBHOOK_PRIVATE_KEY)
# Updated: 2026-04-03 Trinity Endpoint Sync Phase 3B+ / Webhook Refactor
# All Trinity requests proxied through this Cloudflare worker to Akash ingress endpoint
