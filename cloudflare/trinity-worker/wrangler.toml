compatibility_date = "2026-03-10"
workers_dev = true
routes = [
  { pattern = "s25.smajor.org", custom_domain = true },
  { pattern = "api.smajor.org", custom_domain = true }
]

[vars]
ORIGIN_BASE = "http://provider.team-michel.com:30717"
