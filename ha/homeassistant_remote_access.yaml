# ═══════════════════════════════════════════════════════════════════
# Home Assistant — Remote Access Configuration
# PRIORITÉ 3: Cloudflare Zero Trust Secure Tunnel
# ═══════════════════════════════════════════════════════════════════

# This configuration enables HA to be accessed from anywhere via Cloudflare Zero Trust
# without exposing the local network or requiring Cloudflare tunnelsd.

homeassistant:
  # Base URL for external access
  external_url: "https://ha.smajor.org"
  internal_url: "http://homeassistant.local:8123"

  # Trusted proxies (Cloudflare Zero Trust)
  trusted_proxies:
    - 173.245.48.0/20
    - 103.21.244.0/22
    - 103.22.200.0/22
    - 103.31.4.0/22
    - 141.101.64.0/18
    - 108.162.192.0/18
    - 190.93.240.0/20
    - 188.114.96.0/20
    - 197.234.240.0/22
    - 198.41.128.0/17
    - 162.158.0.0/15
    - 172.64.0.0/13
    - 131.0.72.0/22
    - 2400:cb00::/32
    - 2606:4700::/32
    - 2803:f800::/32
    - 2405:b500::/32
    - 2405:8100::/32
    - 2a06:98c0::/29
    - 2c0f:f248::/32

# HTTP Configuration
http:
  cors_allowed_origins:
    - "https://trinity-s25-proxy.trinitys25steph.workers.dev"
    - "https://api.smajor.org"
    - "https://merlin.smajor.org"
  use_x_forwarded_for: true
  ip_ban_enabled: true
  login_attempts_threshold: 5

# API Configuration (for S25 agents)
api:
  # Webhooks for KIMI signals
  - platform: webhook
    name: "S25 KIMI Intel Webhook"
    path: "api/webhook/s25_kimi_scan_secret_xyz"
    method: POST

  # MERLIN command endpoint
  - platform: webhook
    name: "S25 MERLIN Commands"
    path: "api/webhook/s25_merlin_commands"
    method: POST

# Logger Configuration
logger:
  default: info
  logs:
    homeassistant.components.http: debug
    homeassistant.components.webhooks: debug

# Default Configuration
default_config:

# Text Entities for Monitoring
input_text:
  # KIMI endpoint monitoring (PRIORITÉ 1)
  kimi_api_endpoint:
    name: "KIMI Direct API Endpoint"
    initial: "https://api.smajor.org/api/agents/kimi/intel"
    icon: mdi:api

  # MERLIN endpoint monitoring (PRIORITÉ 2)
  merlin_endpoint:
    name: "MERLIN Cloud Endpoint"
    initial: "https://merlin.smajor.org"
    icon: mdi:server

  # HA remote access status
  ha_remote_status:
    name: "HA Remote Access Status"
    initial: "https://ha.smajor.org (Cloudflare Zero Trust)"
    icon: mdi:shield-cloud

# Automations for S25 Integration
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
